name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: notification_preferences
          POSTGRES_USER: notification
          POSTGRES_PASSWORD: notification
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U notification -d notification_preferences"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://notification:notification@localhost:5432/notification_preferences?schema=public
      TEST_DATABASE_URL: postgresql://notification:notification@localhost:5432/notification_preferences?schema=public
      LOG_LEVEL: silent

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Apply migrations
        run: npm run prisma:deploy

      - name: Unit and HTTP tests
        run: npm test

      - name: PostgreSQL integration tests
        run: npm run test:integration
