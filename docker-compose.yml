services:
  postgres:
    image: postgres:16-alpine
    container_name: notification-preferences-postgres
    environment:
      POSTGRES_DB: notification_preferences
      POSTGRES_USER: notification
      POSTGRES_PASSWORD: notification
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notification -d notification_preferences"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
